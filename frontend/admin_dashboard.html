<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<style>
body { margin:0; font-family:'Segoe UI',sans-serif; background:#C8E6C9; padding:20px;}
h1 { color:#2E7D32; text-align:center;}
table { width:100%; border-collapse: collapse; margin-top:20px;}
th, td { border:1px solid #2E7D32; padding:8px; text-align:center;}
th { background:#2E7D32; color:#fff;}
</style>
</head>
<body>
<h1>Admin Dashboard</h1>
<button onclick="window.location.href='create_user.html'">Create User</button>
<h2>All Staff</h2>
<table>
<thead>
<tr><th>Username</th><th>Role</th><th>Villages</th><th>Reports Submitted</th></tr>
</thead>
<tbody id="staffList"></tbody>
</table>

<script>
let users = JSON.parse(localStorage.getItem('users')) || [];
const tbody = document.getElementById('staffList');
users.forEach(u=>{
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${u.username}</td><td>${u.role}</td><td>${u.villages.join(', ')}</td><td>${u.reports.length}</td>`;
  tbody.appendChild(tr);
});
</script>
</body>
</html>
