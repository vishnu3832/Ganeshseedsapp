<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Ganesh Seeds</title>
<style>
body { margin:0; font-family: 'Segoe UI', sans-serif; height:100vh; display:flex; justify-content:center; align-items:center; background:#A8E063; }
.login-box { background:#fff; padding:40px 30px; border-radius:20px; text-align:center; width:400px; box-shadow:0 15px 50px rgba(0,0,0,0.3);}
.login-box img { width:100px; height:100px; border-radius:50%; margin-bottom:15px; object-fit:cover; border:3px solid #2E7D32;}
.login-box h2 { margin-bottom:20px; }
.login-box input { width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc; }
.login-box button { width:100%; padding:12px; border:none; border-radius:10px; background:#2E7D32; color:#fff; font-weight:bold; cursor:pointer; transition:0.3s; }
.login-box button:hover { background:#1B5E20; transform:scale(1.03); }
.login-box a { display:block; margin-top:15px; color:#2E7D32; text-decoration:none; }
</style>
</head>
<body>
<div class="login-box">
  <img id="userPhoto" src="placeholder.png" alt="User Photo">
  <h2>Login</h2>
  <input type="text" placeholder="Username" id="username">
  <input type="password" placeholder="Password" id="password">
  <button onclick="login()">Login</button>
  <a href="create_user.html">Create User</a>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const role = urlParams.get('role');
document.querySelector('h2').innerText = role ? role.charAt(0).toUpperCase() + role.slice(1) + " Login" : "Login";

let users = JSON.parse(localStorage.getItem('users')) || [];
const firstUser = users.find(u=>u.role===role);
if(firstUser) document.getElementById('userPhoto').src = firstUser.photo || "placeholder.png";

function login(){
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  const found = users.find(u=>u.username===username && u.password===password && u.role===role);
  if(found){
    alert(`Welcome ${found.username}`);
    localStorage.setItem('currentUser', JSON.stringify(found));
    if(role==="admin") window.location.href="admin_dashboard.html";
    else if(role==="manager") window.location.href="manager_dashboard.html";
    else if(role==="field_assistant") window.location.href="field_assistant_dashboard.html";
    else window.location.href="farmer_dashboard.html";
  } else alert("Invalid credentials or role!");
}
</script>
</body>
</html>
