<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganesh Seeds - CEO Dashboard</title>
    <style>
        :root { --primary: #2e7d32; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        header { background: white; padding: 20px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .ceo-profile { display: flex; align-items: center; gap: 15px; }
        .ceo-profile img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        .container { max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .report-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; }
        .report-card:hover { transform: translateY(-5px); }
        .report-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .report-content { padding: 15px; }
        .report-content h3 { margin: 0; color: var(--primary); font-size: 1.2rem; }
        .badge { background: #e8f5e9; color: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .logout-btn { background: #c62828; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="ceo-profile">
            <img id="ceo-img" src="https://via.placeholder.com/60" alt="CEO">
            <div>
                <h2 style="margin:0" id="ceo-name">Loading...</h2>
                <p style="margin:0; color:#666;">CEO, Ganesh Seeds</p>
            </div>
        </div>
        <a href="/logout" class="logout-btn">Logout</a>
    </header>

    <h2 style="color: #333; margin-bottom: 20px;">Live Field Reports</h2>
    <div id="report-grid" class="grid">
        <p>Fetching latest updates from field assistants...</p>
    </div>
</div>

<script>
    async function loadDashboard() {
        try {
            // 1. Fetch CEO Details
            const userRes = await fetch('/api/user');
            const userData = await userRes.json();
            
            if (userData.username) {
                document.getElementById('ceo-name').innerText = userData.username;
                document.getElementById('ceo-img').src = userData.photo || 'https://via.placeholder.com/60';
            }

            // 2. Fetch All Field Reports from MongoDB
            const reportRes = await fetch('/api/reports');
            const reports = await reportRes.json();
            
            const grid = document.getElementById('report-grid');
            if (reports.length === 0) {
                grid.innerHTML = "<p>No reports submitted yet.</p>";
                return;
            }

            grid.innerHTML = reports.map(report => `
                <div class="report-card">
                    <img class="report-img" src="${report.photo || 'https://via.placeholder.com/300x200?text=No+Photo'}" alt="Field Report">
                    <div class="report-content">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                            <span class="badge">${report.village}</span>
                            <small style="color:#888">${report.date}</small>
                        </div>
                        <h3>Farmer: ${report.farmer}</h3>
                        <p style="color:#555; font-size:0.95rem; line-height:1.4;">${report.text}</p>
                        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                        <small style="color:#2e7d32"><b>Submitted By:</b> ${report.submittedBy || 'Assistant'}</small>
                    </div>
                </div>
            `).join('');

        } catch (error) {
            console.error("Dashboard Load Error:", error);
            document.getElementById('report-grid').innerHTML = "<p>Error connecting to Ganesh Seeds Server. Please refresh.</p>";
        }
    }

    // Load data when page opens
    window.onload = loadDashboard;
</script>

</body>
</html>
