<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farmer Portal | Ganesh Seeds</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #e8f5e9; margin: 0; text-align: center; }
        .hero { background: #1b5e20; color: white; padding: 60px 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .product-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .product-card img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        .product-card h3 { color: #1b5e20; margin: 0; }
        .btn-call { display: inline-block; background: #2e7d32; color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Ganesh Seeds Farmer Portal</h1>
        <p>Top Quality Seeds for High Yield</p>
    </div>

    <div class="product-grid">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1592982537447-7440770cbfc9?auto=format&fit=crop&q=80&w=400" alt="Seeds">
            <h3>Premium Cotton</h3>
            <p>Best for South Indian Soil</p>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1594489428504-5c0c480a15fd?auto=format&fit=crop&q=80&w=400" alt="Maize">
            <h3>High-Yield Maize</h3>
            <p>Drought Resistant Variety</p>
        </div>
    </div>

    <a href="tel:+910000000000" class="btn-call">📞 Call Field Assistant</a>
</body>
</html>
