<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager Dashboard</title>
<style>
body { margin:0; font-family:'Segoe UI',sans-serif; background:#C8E6C9; padding:20px;}
h1 { color:#2E7D32; text-align:center;}
table { width:100%; border-collapse: collapse; margin-top:20px;}
th, td { border:1px solid #2E7D32; padding:8px; text-align:center;}
th { background:#2E7D32; color:#fff;}
button { margin:10px; padding:10px; border:none; border-radius:8px; background:#2E7D32; color:#fff; cursor:pointer;}
button:hover { background:#1B5E20; }
</style>
</head>
<body>
<h1>Manager Dashboard</h1>
<button onclick="window.location.href='create_user.html'">Create User</button>
<h2>Staff in Your Villages</h2>
<table>
<thead><tr><th>Username</th><th>Role</th><th>Villages</th><th>Reports</th></tr></thead>
<tbody id="staffList"></tbody>
</table>

<h2>Submit Field Report</h2>
<input type="text" placeholder="Village" id="reportVillage">
<input type="text" placeholder="Details" id="reportDetails">
<input type="file" id="reportPhoto" accept="image/*">
<button onclick="submitReport()">Submit Report</button>

<script>
const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};
let users = JSON.parse(localStorage.getItem('users')) || [];
const tbody = document.getElementById('staffList');

// display staff in manager's villages
users.forEach(u=>{
  if(u.villages.some(v=>currentUser.villages.includes(v))){
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${u.username}</td><td>${u.role}</td><td>${u.villages.join(', ')}</td><td>${u.reports.length}</td>`;
    tbody.appendChild(tr);
  }
});

// submit report
function submitReport(){
  const village = document.getElementById('reportVillage').value.trim();
  const details = document.getElementById('reportDetails').value.trim();
  const file = document.getElementById('reportPhoto').files[0];

  if(!village || !details || !file){ alert("Fill all fields!"); return; }

  const reader = new FileReader();
  reader.onload = function(e){
    const report = { village, details, photo:e.target.result, date:new Date().toLocaleDateString(), submittedBy:currentUser.username };
    // add to current user
    const idx = users.findIndex(u=>u.username===currentUser.username);
    if(idx>=0) users[idx].reports.push(report);
    localStorage.setItem('users', JSON.stringify(users));
    alert("Report submitted!");
    location.reload();
  }
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
