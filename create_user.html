<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Onboarding | Ganesh Seeds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 antialiased">
    <div class="max-w-4xl w-full bg-white rounded-[3.5rem] shadow-2xl overflow-hidden border border-gray-100 flex flex-col md:flex-row">
        <div class="md:w-1/3 bg-green-900 p-12 text-white flex flex-col justify-between">
            <div>
                <div class="bg-white/20 w-12 h-12 rounded-2xl flex items-center justify-center text-xl mb-8">🛡️</div>
                <h2 class="text-3xl font-black tracking-tight leading-none">Security & Roles</h2>
                <p class="mt-4 text-green-200 text-sm font-medium leading-relaxed">Please ensure all field data is accurate. Your profile photo will be used for your official digital identity.</p>
            </div>
            <div class="text-[10px] font-black uppercase tracking-[0.2em] opacity-40">System v2.1.0</div>
        </div>

        <form action="/register" method="POST" enctype="multipart/form-data" class="flex-1 p-12 lg:p-16 space-y-8">
            <header>
                <h3 class="text-3xl font-black text-gray-900 tracking-tight">Create Staff Account</h3>
                <p class="text-gray-400 font-medium text-sm mt-1">Fill in the official details to proceed.</p>
            </header>

            <div class="group relative bg-gray-50 border-2 border-dashed border-gray-200 rounded-[2rem] p-8 text-center hover:border-green-500 hover:bg-green-50 transition-all duration-300">
                <input type="file" name="userPhoto" id="userPhoto" class="hidden" required>
                <label for="userPhoto" class="cursor-pointer block">
                    <div class="w-16 h-16 bg-green-100 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 group-hover:scale-110 transition duration-300">📸</div>
                    <span class="px-6 py-2 bg-green-800 text-white rounded-full font-bold text-[10px] uppercase tracking-widest shadow-lg">Upload Identity Photo</span>
                    <p class="text-[10px] text-gray-400 mt-4 font-black uppercase tracking-tighter">JPG, PNG up to 5MB</p>
                </label>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4">Full Legal Name</label>
                    <input type="text" name="fullname" placeholder="Ex: Arjun Verma" class="w-full p-5 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-green-600 font-bold text-gray-800 transition" required>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4">Assigned Role</label>
                    <select name="role" class="w-full p-5 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-green-600 font-bold text-gray-800 transition cursor-pointer" required>
                        <option value="fieldassistant">Field Assistant</option>
                        <option value="manager">Company Manager</option>
                        <option value="farmer">VIP Farmer</option>
                        <option value="admin">System Administrator</option>
                    </select>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4">Primary Village / Work Region</label>
                <input type="text" name="village" placeholder="Ex: Rampur North" class="w-full p-5 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-green-600 font-bold text-gray-800 transition" required>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4">Secure Access Password</label>
                <input type="password" name="password" placeholder="••••••••" class="w-full p-5 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-green-600 font-bold text-gray-800 transition" required>
            </div>

            <button type="submit" class="w-full bg-green-800 text-white py-6 rounded-[2rem] font-black text-xl shadow-2xl shadow-green-100 hover:bg-black transform active:scale-[0.98] transition-all">
                CONFIRM REGISTRATION
            </button>
        </form>
    </div>
</body>
</html>
