<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Onboarding | Ganesh Seeds</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1b5e20, #4caf50); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .form-container { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); width: 100%; max-width: 450px; text-align: center; }
        .form-container h2 { color: #1b5e20; margin-bottom: 30px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .file-label { display: block; background: #f0f0f0; border: 2px dashed #ccc; padding: 20px; border-radius: 10px; cursor: pointer; margin: 10px 0; }
        .btn { background: #1b5e20; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #2e7d32; transform: scale(1.02); }
        #preview { width: 80px; height: 80px; border-radius: 50%; display: none; margin: 10px auto; object-fit: cover; border: 3px solid #4caf50; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Ganesh Seeds ERP</h2>
        <p style="color: #666;">New Staff Registration</p>
        <form action="/register" method="POST" enctype="multipart/form-data">
            <input type="text" name="fullname" placeholder="Full Name" required>
            <select name="role">
                <option value="manager">CEO / Manager</option>
                <option value="fieldassistant">Field Assistant</option>
            </select>
            <input type="password" name="password" placeholder="Create Password" required>
            
            <label class="file-label">
                <i class="fas fa-camera"></i> Upload Profile Photo
                <input type="file" name="userPhoto" id="photoInput" accept="image/*" hidden required>
            </label>
            <img id="preview">

            <button type="submit" class="btn">Complete Onboarding</button>
        </form>
        <p style="margin-top: 20px;"><a href="/login.html" style="color: #1b5e20; text-decoration: none;">Already registered? Login</a></p>
    </div>

    <script>
        document.getElementById('photoInput').onchange = function (evt) {
            const [file] = this.files;
            if (file) {
                const preview = document.getElementById('preview');
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
            }
        }
    </script>
</body>
</html>
