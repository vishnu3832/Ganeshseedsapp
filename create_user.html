<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create User - Ganesh Seeds</title>
<style>
body { margin:0; font-family:'Segoe UI',sans-serif; height:100vh; display:flex; justify-content:center; align-items:center; background:#C8E6C9;}
.create-box { background:#fff; padding:40px 30px; border-radius:20px; width:400px; text-align:center; box-shadow:0 15px 50px rgba(0,0,0,0.3);}
.create-box img { width:100px; height:100px; border-radius:50%; margin-bottom:15px; object-fit:cover; border:3px solid #2E7D32;}
.create-box input, select { width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ccc; }
.create-box button { width:100%; padding:12px; border:none; border-radius:10px; background:#2E7D32; color:#fff; font-weight:bold; cursor:pointer; transition:0.3s; }
.create-box button:hover { background:#1B5E20; transform:scale(1.03);}
</style>
</head>
<body>
<div class="create-box">
  <img id="preview" src="placeholder.png" alt="Photo Preview">
  <h2>Create User</h2>
  <select id="role">
    <option value="manager">Manager</option>
    <option value="field_assistant">Field Assistant</option>
    <option value="farmer">Farmer</option>
  </select>
  <input type="text" placeholder="Username" id="username">
  <input type="password" placeholder="Password" id="password">
  <input type="text" placeholder="Villages (comma separated)" id="villages">
  <input type="file" id="photoInput" accept="image/*">
  <button onclick="createUser()">Create User</button>
</div>

<script>
// Photo preview
document.getElementById('photoInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(e){ document.getElementById('preview').src = e.target.result; }
    reader.readAsDataURL(file);
  }
});

// Save user in localStorage
function createUser(){
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const role = document.getElementById('role').value;
  const villages = document.getElementById('villages').value.split(',').map(v=>v.trim()).filter(v=>v);
  const photo = document.getElementById('preview').src;

  if(!username || !password){ alert("Enter username & password"); return; }
  if(villages.length===0){ alert("Enter at least one village"); return; }

  let users = JSON.parse(localStorage.getItem('users')) || [];
  if(users.find(u=>u.username===username && u.role===role)){
    alert("User already exists with this username and role!");
    return;
  }

  users.push({ username, password, role, villages, photo, reports: [] });
  localStorage.setItem('users', JSON.stringify(users));
  alert("User created successfully!");
  window.location.href=`login.html?role=${role}`;
}
</script>
</body>
</html>
