<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Ganesh Seeds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
</head>
<body class="bg-green-950 min-h-screen flex items-center justify-center p-6 antialiased font-['Plus_Jakarta_Sans']">
    <div class="max-w-md w-full">
        <div class="flex justify-center mb-10">
            <div class="bg-white p-4 rounded-[2rem] shadow-2xl">
                <div class="bg-green-800 px-6 py-4 rounded-2xl text-white font-black text-4xl">GS</div>
            </div>
        </div>

        <div class="bg-white rounded-[3.5rem] shadow-[0_35px_60px_-15px_rgba(0,0,0,0.5)] overflow-hidden">
            <div class="p-12 pb-6 text-center">
                <h2 class="text-4xl font-black text-gray-900 tracking-tight">Portal Access</h2>
                <p class="text-gray-400 font-medium mt-2">Enter your credentials to continue.</p>
            </div>

            <form action="/login" method="POST" class="p-12 pt-6 space-y-6">
                <div class="group">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4 group-focus-within:text-green-600 transition">User Identity (Full Name)</label>
                    <input type="text" name="username" placeholder="Arjun Verma" class="w-full p-5 mt-1 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-green-600 focus:bg-white outline-none font-bold text-gray-800 transition" required>
                </div>

                <div class="group">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4 group-focus-within:text-green-600 transition">Secret Password</label>
                    <input type="password" name="password" placeholder="••••••••" class="w-full p-5 mt-1 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-green-600 focus:bg-white outline-none font-bold text-gray-800 transition" required>
                </div>

                <button type="submit" class="w-full bg-green-800 text-white py-6 rounded-[2rem] font-black text-xl shadow-2xl hover:bg-black transform active:scale-95 transition-all">
                    SIGN IN NOW
                </button>

                <div class="pt-6 text-center border-t border-gray-50">
                    <p class="text-sm font-bold text-gray-400">Unauthorized access is monitored.</p>
                    <a href="create_user.html" class="inline-block mt-4 text-green-700 font-black text-xs uppercase tracking-widest hover:underline">New Staff? Register Here</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
